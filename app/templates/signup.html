<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 80px auto; padding: 0 20px; }
    input { display: block; width: 100%; padding: 10px; margin: 8px 0 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #5c6bc0; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    .error { background: #fdecea; color: #c62828; padding: 12px; border-radius: 4px; margin-bottom: 16px; border-left: 4px solid #e57373; }
    a { color: #5c6bc0; }
  </style>
</head>
<body>
  <h1>Create Account</h1>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form action="/signup" method="POST">
    <label>Name</label>
    <input type="text" name="name" placeholder="Your name" />

    <label>Email</label>
    <input type="email" name="email" placeholder="you@example.com" />

    <label>Password</label>
    <input type="password" name="password" placeholder="Min 6 characters" />

    <button type="submit">Sign Up</button>
  </form>

  <p>Already have an account? <a href="/login">Log in</a></p>
</body>
</html>
