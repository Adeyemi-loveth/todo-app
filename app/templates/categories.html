<!DOCTYPE html>
<html>
<head>
  <title>Categories</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
    input[type="text"] { padding: 10px; width: 60%; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 16px; background: #5c6bc0; color: white; border: none; border-radius: 4px; cursor: pointer; }
    ul { list-style: none; padding: 0; margin-top: 24px; }
    li { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid #eee; }
    .del { margin-left: auto; background: #e57373; color: white; border: none; border-radius: 4px; padding: 6px 10px; cursor: pointer; }
    .error { background: #fdecea; color: #c62828; padding: 12px; border-radius: 4px; margin-top: 12px; border-left: 4px solid #e57373; }
    a { color: #5c6bc0; }
  </style>
</head>
<body>
  <h1>Categories</h1>
  <a href="/">← Back to todos</a>

  <form action="/categories/add" method="POST" style="margin-top: 20px;">
    <input type="text" name="name" placeholder="New category name" />
    <button type="submit">Add</button>
  </form>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <ul>
    {% for cat in categories %}
    <li>
      {{ cat.name }}
      <form action="/categories/{{ cat.id }}/delete" method="POST" style="margin-left:auto">
        <button class="del" type="submit">✕</button>
      </form>
    </li>
    {% endfor %}
  </ul>
</body>
</html>
