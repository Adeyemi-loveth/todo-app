<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 80px auto; padding: 0 20px; }
    input { display: block; width: 100%; padding: 10px; margin: 8px 0 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #5c6bc0; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .error { background: #fdecea; color: #c62828; padding: 12px; border-radius: 4px; margin-bottom: 16px; border-left: 4px solid #e57373; }
    .message { background: #e8f5e9; color: #2e7d32; padding: 12px; border-radius: 4px; margin-bottom: 16px; border-left: 4px solid #81c784; }
    a { color: #5c6bc0; }
  </style>
</head>
<body>
  <h1>Reset Password</h1>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  {% if message %}
  <div class="message">{{ message }}</div>
  {% else %}
  <form action="/reset-password" method="POST">
    <label>Enter your email address</label>
    <input type="email" name="email" placeholder="you@example.com" />
    <button type="submit">Send Reset Link</button>
  </form>
  {% endif %}

  <p><a href="/login">Back to login</a></p>
</body>
</html>
